<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AK Studios</title>
    <style>
        body {
            background-color: #0a050d;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: #160c1d;
            height: 100vh;
            padding: 2rem;
            border-right: 1px solid #442055;
        }
        .main-content {
            flex: 1;
            padding: 2rem;
        }
        h1, h2 {
            font-family: 'Playfair Display', serif;
            color: #e6e6fa;
        }
        .card {
            background: #2b1136;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid #442055;
        }
        .btn {
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #e6e6fa 0%, #b3a1c7 100%);
            color: #2b1136;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>AK Studios</h2>
        <ul style="list-style: none; padding: 0; margin-top: 2rem;">
            <li style="margin-bottom: 1rem;"><a href="#" style="color: white; text-decoration: none;">Dashboard</a></li>
            <li style="margin-bottom: 1rem;"><a href="#" style="color: white; text-decoration: none;">Portfolio Uploads</a></li>
            <li style="margin-bottom: 1rem;"><a href="#" style="color: white; text-decoration: none;">Inquiries</a></li>
            <li style="margin-bottom: 1rem;"><a href="#" id="logoutBtn" style="color: #a69bb0; text-decoration: none;">Logout</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Dashboard Overview</h1>
        
        <div class="card">
            <h3>Recent Inquiries</h3>
            <div id="inquiriesContainer">
                <p>Loading inquiries...</p>
            </div>
        </div>

        <div class="card">
            <h3>Upload New Photo</h3>
            <form id="uploadForm">
                <input type="file" id="photoFile" accept="image/*" required style="margin-bottom: 1rem; display: block;">
                <input type="text" id="photoCaption" placeholder="Caption" style="padding: 0.5rem; width: 100%; max-width: 300px; margin-bottom: 1rem; display: block; background: #160c1d; color: white; border: 1px solid #442055;">
                <select id="photoCategory" style="padding: 0.5rem; width: 100%; max-width: 300px; margin-bottom: 1rem; display: block; background: #160c1d; color: white; border: 1px solid #442055;">
                    <option value="wedding">Wedding</option>
                    <option value="portrait">Portrait</option>
                    <option value="event">Event</option>
                </select>
                <div id="uploadStatus" style="margin-bottom: 1rem; font-size: 0.9rem;"></div>
                <button type="submit" class="btn">Upload to Storage</button>
            </form>
        </div>
    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
